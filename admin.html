<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - CRM Leads Medicos</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0b0f1a;
  --surface: #141a2e;
  --surface2: #1b2340;
  --surface3: #222b4a;
  --border: #2a3458;
  --border-light: #354170;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --text3: #64748b;
  --accent: #6366f1;
  --accent2: #818cf8;
  --accent-glow: rgba(99,102,241,.15);
  --green: #22c55e;
  --green-bg: rgba(34,197,94,.12);
  --orange: #f59e0b;
  --orange-bg: rgba(245,158,11,.12);
  --red: #ef4444;
  --red-bg: rgba(239,68,68,.12);
  --radius: 10px;
  --radius-lg: 14px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding:24px; }
::selection { background:var(--accent); color:#fff; }
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:var(--surface); }
::-webkit-scrollbar-thumb { background:var(--border-light); border-radius:3px; }

.header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; padding-bottom:16px; border-bottom:1px solid var(--border); }
.header h1 { font-size:24px; font-weight:800; }
.header h1 span { color:var(--accent2); }
.header-actions { display:flex; gap:8px; align-items:center; }

.btn { padding:8px 16px; border-radius:8px; font-size:12px; font-weight:600; cursor:pointer; border:none; transition:all .15s; display:inline-flex; align-items:center; gap:6px; text-decoration:none; }
.btn-ghost { background:transparent; color:var(--text2); border:1.5px solid var(--border); }
.btn-ghost:hover { border-color:var(--accent); color:var(--accent2); }
.btn-accent { background:var(--accent); color:#fff; }
.btn-accent:hover { background:var(--accent2); }
.btn-green { background:var(--green); color:#fff; }
.btn-red { background:var(--red); color:#fff; }
.btn-red:hover { opacity:.85; }

.stats-bar { display:flex; gap:12px; margin-bottom:24px; flex-wrap:wrap; }
.stat-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px 20px; min-width:140px; }
.stat-card .num { font-size:28px; font-weight:800; color:var(--accent2); }
.stat-card .label { font-size:11px; color:var(--text3); text-transform:uppercase; letter-spacing:.5px; margin-top:4px; }

.tabs { display:flex; gap:4px; margin-bottom:20px; background:var(--surface); border-radius:var(--radius); padding:4px; border:1px solid var(--border); width:fit-content; }
.tab { padding:8px 20px; border-radius:7px; font-size:13px; font-weight:600; cursor:pointer; border:none; background:transparent; color:var(--text3); transition:all .15s; }
.tab:hover { color:var(--text2); }
.tab.active { background:var(--accent); color:#fff; }

.search-bar { margin-bottom:20px; }
.search-bar input { width:100%; max-width:400px; padding:10px 16px; background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius); color:var(--text); font-size:13px; outline:none; }
.search-bar input:focus { border-color:var(--accent); }

.table-wrap { overflow-x:auto; border-radius:var(--radius-lg); border:1px solid var(--border); }
table { width:100%; border-collapse:collapse; }
thead th { position:sticky; top:0; background:var(--surface2); padding:12px 14px; font-size:10px; text-transform:uppercase; letter-spacing:.7px; color:var(--text3); text-align:left; border-bottom:2px solid var(--border); white-space:nowrap; }
tbody td { padding:12px 14px; font-size:13px; border-bottom:1px solid var(--border); vertical-align:top; }
tbody tr { transition:background .1s; }
tbody tr:hover { background:var(--surface2); }
tbody tr.deleted { opacity:.45; }

.td-name { font-weight:700; color:var(--text); min-width:180px; }
.td-notes { max-width:300px; color:var(--text2); font-size:12px; line-height:1.6; white-space:pre-wrap; word-break:break-word; }

.badge { display:inline-block; padding:3px 8px; border-radius:4px; font-size:10px; font-weight:700; }
.badge-fav { background:var(--orange-bg); color:var(--orange); }
.badge-contacted { background:var(--green-bg); color:var(--green); }
.badge-deleted { background:var(--red-bg); color:var(--red); }
.badge-active { background:var(--accent-glow); color:var(--accent2); }

.social-pill { display:inline-flex; padding:3px 7px; border-radius:4px; font-size:10px; font-weight:600; text-decoration:none; color:#fff; margin:1px; }
.s-wa { background:#25d366; }
.s-ig { background:linear-gradient(45deg,#f09433,#dc2743); }
.s-fb { background:#1877f2; }
.s-li { background:#0a66c2; }
.s-em { background:var(--red); }
.s-tel { background:var(--green); }

.empty { text-align:center; padding:60px; color:var(--text3); font-size:14px; }

.note-cell { position:relative; }
.note-cell textarea { width:100%; min-height:40px; padding:6px 8px; background:var(--surface2); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:12px; font-family:inherit; resize:vertical; outline:none; }
.note-cell textarea:focus { border-color:var(--accent); }

#toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--surface3); color:var(--text); padding:10px 20px; border-radius:8px; font-size:13px; font-weight:600; z-index:400; display:none; border:1px solid var(--border); }

.loading { text-align:center; padding:60px; color:var(--text3); }
.loading .spinner { display:inline-block; width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; margin-bottom:12px; }
@keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Lead<span>Scope</span> Admin</h1>
    <div style="font-size:12px;color:var(--text3);margin-top:4px">Vista de leads marcados desde Google Sheets</div>
  </div>
  <div class="header-actions">
    <button class="btn btn-ghost" onclick="loadData()">Recargar</button>
    <button class="btn btn-ghost" onclick="exportAdminCSV()">Exportar CSV</button>
    <a class="btn btn-accent" href="index.html" style="text-decoration:none">Volver al CRM</a>
  </div>
</div>

<div class="stats-bar" id="statsBar">
  <div class="stat-card"><div class="num" id="statTotal">-</div><div class="label">Total registros</div></div>
  <div class="stat-card"><div class="num" id="statContacted" style="color:var(--green)">-</div><div class="label">Contactados</div></div>
  <div class="stat-card"><div class="num" id="statFavs" style="color:var(--orange)">-</div><div class="label">Favoritos</div></div>
  <div class="stat-card"><div class="num" id="statNotes" style="color:var(--accent2)">-</div><div class="label">Con notas</div></div>
  <div class="stat-card"><div class="num" id="statDeleted" style="color:var(--red)">-</div><div class="label">Eliminados</div></div>
</div>

<div class="tabs" id="tabs">
  <button class="tab active" data-tab="all" onclick="setTab('all')">Todos</button>
  <button class="tab" data-tab="contacted" onclick="setTab('contacted')">Contactados</button>
  <button class="tab" data-tab="favs" onclick="setTab('favs')">Favoritos</button>
  <button class="tab" data-tab="notes" onclick="setTab('notes')">Con notas</button>
  <button class="tab" data-tab="deleted" onclick="setTab('deleted')">Eliminados</button>
</div>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="Buscar por nombre, notas...">
</div>

<div id="content">
  <div class="loading"><div class="spinner"></div><div>Cargando datos desde Google Sheets...</div></div>
</div>

<div id="toast"></div>

<script src="_data.js"></script>
<script>
const SHEET_API = 'https://script.google.com/macros/s/AKfycbxveEz3bgeCgDfteoaHVtwLr84hOsUNCtIZedUOBPWxdULqEgdsQMUEf2zIEqPoJm4y/exec';

let sheetData = {};
let allRows = [];
let currentTab = 'all';
let doctorMap = {};

// Build lookup from _data.js
if (typeof DATA !== 'undefined') {
  DATA.forEach(d => {
    const id = d.url || d.n;
    doctorMap[id] = d;
  });
}

function debounce(fn, ms) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; }

document.getElementById('searchInput').addEventListener('input', debounce(renderTable, 250));

async function loadData() {
  document.getElementById('content').innerHTML = '<div class="loading"><div class="spinner"></div><div>Cargando datos desde Google Sheets...</div></div>';
  try {
    const res = await fetch(SHEET_API);
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || 'Error desconocido');

    sheetData = json.data;
    allRows = Object.entries(sheetData).map(([id, row]) => ({
      id,
      ...row,
      doctor: doctorMap[id] || null
    }));

    updateStats();
    renderTable();
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="empty">Error al cargar: ${e.message}<br><br>Verifica que el Apps Script esté desplegado correctamente.</div>`;
  }
}

function updateStats() {
  const active = allRows.filter(r => r.status !== 'deleted');
  document.getElementById('statTotal').textContent = allRows.length;
  document.getElementById('statContacted').textContent = active.filter(r => r.contacted).length;
  document.getElementById('statFavs').textContent = active.filter(r => r.favorited).length;
  document.getElementById('statNotes').textContent = active.filter(r => r.notes).length;
  document.getElementById('statDeleted').textContent = allRows.filter(r => r.status === 'deleted').length;
}

function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  renderTable();
}

function getFiltered() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();

  let rows = allRows;

  // Tab filter
  if (currentTab === 'contacted') rows = rows.filter(r => r.contacted && r.status !== 'deleted');
  else if (currentTab === 'favs') rows = rows.filter(r => r.favorited && r.status !== 'deleted');
  else if (currentTab === 'notes') rows = rows.filter(r => r.notes && r.status !== 'deleted');
  else if (currentTab === 'deleted') rows = rows.filter(r => r.status === 'deleted');
  else rows = rows.filter(r => r.status !== 'deleted');

  // Search
  if (q) {
    rows = rows.filter(r => {
      const hay = [r.doctor_name, r.notes, r.id, r.doctor?.e, r.doctor?.c].filter(Boolean).join(' ').toLowerCase();
      return hay.includes(q);
    });
  }

  return rows;
}

function renderTable() {
  const rows = getFiltered();

  if (!rows.length) {
    document.getElementById('content').innerHTML = '<div class="empty">No hay registros para mostrar en esta vista.</div>';
    return;
  }

  let html = `<div class="table-wrap"><table>
    <thead><tr>
      <th>Doctor</th>
      <th>Especialidad</th>
      <th>Ciudad</th>
      <th>Estado</th>
      <th>Contacto</th>
      <th>Notas</th>
      <th>Fecha</th>
      <th>Acciones</th>
    </tr></thead><tbody>`;

  for (const r of rows) {
    const d = r.doctor;
    const isDeleted = r.status === 'deleted';
    const name = r.doctor_name || d?.n || r.id;

    // Status badges
    let badges = '';
    if (r.contacted) badges += '<span class="badge badge-contacted">Contactado</span> ';
    if (r.favorited) badges += '<span class="badge badge-fav">Favorito</span> ';
    if (isDeleted) badges += '<span class="badge badge-deleted">Eliminado</span> ';
    if (!isDeleted && !r.contacted && !r.favorited) badges += '<span class="badge badge-active">Activo</span>';

    // Contact links
    let contact = '';
    if (d) {
      if (d.tel) {
        const phone = d.tel.split(',')[0].trim().replace(/[\s()-]/g,'');
        const wa = phone.replace(/^\+?57/,'57');
        contact += `<a class="social-pill s-tel" href="tel:${esc(phone)}" title="${esc(d.tel)}">Tel</a>`;
        contact += `<a class="social-pill s-wa" href="https://wa.me/${wa}" target="_blank">WA</a>`;
      }
      if (d.em) contact += `<a class="social-pill s-em" href="mailto:${esc(d.em)}" title="${esc(d.em)}">Email</a>`;
      if (d.ig) contact += `<a class="social-pill s-ig" href="${esc(d.ig)}" target="_blank">IG</a>`;
      if (d.fb) contact += `<a class="social-pill s-fb" href="${esc(d.fb)}" target="_blank">FB</a>`;
      if (d.li) contact += `<a class="social-pill s-li" href="${esc(d.li)}" target="_blank">IN</a>`;
    }

    // Date
    const date = r.updated_at ? new Date(r.updated_at).toLocaleDateString('es-CO', { day:'2-digit', month:'short', year:'2-digit', hour:'2-digit', minute:'2-digit' }) : '-';

    // Actions
    let actions = '';
    if (isDeleted) {
      actions = `<button class="btn btn-green" style="font-size:11px;padding:5px 10px" onclick="restoreDoctor('${esc(r.id)}')">Restaurar</button>`;
    } else {
      actions = `<button class="btn btn-red" style="font-size:11px;padding:5px 10px" onclick="softDeleteDoctor('${esc(r.id)}')">Eliminar</button>`;
    }

    html += `<tr class="${isDeleted ? 'deleted' : ''}">
      <td class="td-name">${d?.url ? `<a href="${esc(d.url)}" target="_blank" style="color:var(--text);text-decoration:none">${esc(name)}</a>` : esc(name)}</td>
      <td style="font-size:12px;color:var(--text3)">${esc(d?.e || '-')}</td>
      <td style="font-size:12px">${esc(d?.c || '-')}</td>
      <td>${badges}</td>
      <td>${contact || '<span style="color:var(--text3)">-</span>'}</td>
      <td class="td-notes note-cell">
        <textarea onchange="updateNote('${esc(r.id)}', this.value)">${esc(r.notes || '')}</textarea>
      </td>
      <td style="font-size:11px;color:var(--text3);white-space:nowrap">${date}</td>
      <td>${actions}</td>
    </tr>`;
  }

  html += '</tbody></table></div>';
  document.getElementById('content').innerHTML = html;
}

// ===== Actions =====

async function softDeleteDoctor(id) {
  try {
    await fetch(SHEET_API, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'softdelete', doctor_id: id }),
      mode: 'no-cors'
    });
    // Update local state
    const row = allRows.find(r => r.id === id);
    if (row) row.status = 'deleted';
    updateStats();
    renderTable();
    toast('Doctor marcado como eliminado');
  } catch (e) {
    toast('Error: ' + e.message);
  }
}

async function restoreDoctor(id) {
  try {
    await fetch(SHEET_API, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'restore', doctor_id: id }),
      mode: 'no-cors'
    });
    const row = allRows.find(r => r.id === id);
    if (row) row.status = 'active';
    updateStats();
    renderTable();
    toast('Doctor restaurado');
  } catch (e) {
    toast('Error: ' + e.message);
  }
}

const debouncedNoteSave = debounce(async (id, value) => {
  try {
    await fetch(SHEET_API, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'update', doctor_id: id, notes: value }),
      mode: 'no-cors'
    });
    const row = allRows.find(r => r.id === id);
    if (row) row.notes = value;
    toast('Nota guardada');
  } catch (e) {
    toast('Error guardando nota');
  }
}, 1000);

function updateNote(id, value) {
  debouncedNoteSave(id, value);
}

// ===== Export =====
function exportAdminCSV() {
  const rows = getFiltered();
  if (!rows.length) { toast('No hay datos para exportar'); return; }

  const h = ['Nombre','Especialidad','Ciudad','Telefono','Email','Instagram','Favorito','Contactado','Notas','Estado','Fecha','URL'];
  const csvRows = rows.map(r => {
    const d = r.doctor;
    return [
      r.doctor_name || d?.n || '', d?.e || '', d?.c || '', d?.tel || '', d?.em || '', d?.ig || '',
      r.favorited ? 'Si' : '', r.contacted ? 'Si' : '', r.notes || '',
      r.status || 'active', r.updated_at || '', d?.url || r.id
    ];
  });

  let csv = '\uFEFF' + h.join(',') + '\n';
  for (const r of csvRows) csv += r.map(v => `"${(v||'').toString().replace(/"/g,'""')}"`).join(',') + '\n';

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `admin_leads_${rows.length}.csv`;
  a.click();
  toast(`CSV exportado: ${rows.length} registros`);
}

// ===== Utils =====
function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function toast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2500); }

// ===== Init =====
loadData();
</script>
</body>
</html>
